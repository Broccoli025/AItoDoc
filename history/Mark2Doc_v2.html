<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark2Doc · Markdown → Word</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: { inlineMath:[['$','$'],['\\(','\\)']], displayMath:[['$$','$$'],['\\[','\\]']], processEscapes:true },
  svg: { fontCache:'global' },
  startup: { typeset:false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --surface2: #fafaf8;
  --border:   #e8e6e1;
  --border2:  #d2cfc8;
  --text:     #1c1b18;
  --text2:    #6b6760;
  --text3:    #aba79f;
  --accent:   #2563eb;
  --accent-h: #1d4ed8;
  --accent-lt:#eff4ff;
  --green:    #16a34a;
  --green-lt: #f0fdf4;
  --red:      #dc2626;
  --red-lt:   #fef2f2;
  --sb-w:     256px;
  --hh:       52px;
  --fh:       62px;
  --font:     'Inter', system-ui, sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --serif:    'Lora', Georgia, serif;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font); -webkit-font-smoothing:antialiased; }

/* ─── HEADER ──────────────────────────────── */
header {
  position:fixed; inset:0 0 auto 0; height:var(--hh); z-index:200;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 18px; gap:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.logo { display:flex; align-items:center; gap:7px; font-size:16px; font-weight:600; letter-spacing:-.02em; }
.logo-mark { width:26px; height:26px; border-radius:6px; background:var(--accent); display:flex; align-items:center; justify-content:center; }
.logo-mark svg { stroke:#fff; }
.h-sep { width:1px; height:18px; background:var(--border); }
.h-sub { font-size:12px; color:var(--text3); }
.h-gap { flex:1; }
#mj-badge { font-size:11px; font-family:var(--mono); display:flex; align-items:center; gap:5px; color:var(--text3); transition:color .3s; }
#mj-badge.ready { color:var(--green); }
#mj-badge .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

/* ─── LAYOUT ──────────────────────────────── */
.app { display:flex; margin-top:var(--hh); height:calc(100vh - var(--hh)); overflow:hidden; }

/* ─── SIDEBAR ─────────────────────────────── */
.sidebar { width:var(--sb-w); flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:width 0.22s cubic-bezier(0.4,0,0.2,1); }
.sidebar.collapsed { width:0; border-right-color:transparent; }
.sb-top { padding:12px 10px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.sb-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); }
.sb-badge { font-size:10.5px; font-family:var(--mono); background:var(--bg); color:var(--text3); padding:1px 7px; border-radius:10px; border:1px solid var(--border); }
.sb-collapse-btn { width:20px; height:20px; border-radius:4px; background:none; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); flex-shrink:0; transition:all .12s; }
.sb-collapse-btn:hover { background:var(--bg); color:var(--text2); border-color:var(--border2); }
.sb-expand-fab { position:fixed; left:0; top:calc(var(--hh) + 10px); z-index:150; width:22px; height:40px; background:var(--surface); border:1px solid var(--border); border-left:none; border-radius:0 6px 6px 0; cursor:pointer; display:none; align-items:center; justify-content:center; color:var(--text3); box-shadow:2px 0 5px rgba(0,0,0,.08); transition:all .12s; }
.sb-expand-fab:hover { color:var(--accent); background:var(--accent-lt); border-color:#bfdbfe; }
.sb-expand-fab.visible { display:flex; }
.new-btn { width:100%; padding:7px 10px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-family:var(--font); font-size:12.5px; font-weight:500; cursor:pointer; transition:background .12s; display:flex; align-items:center; justify-content:center; gap:5px; }
.new-btn:hover { background:var(--accent-h); }
.arch-list { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:2px; }
.arch-empty { color:var(--text3); font-size:12px; text-align:center; padding:28px 12px; line-height:1.7; }
.arch-item { border-radius:7px; padding:8px 10px; cursor:pointer; transition:background .1s; border:1px solid transparent; position:relative; }
.arch-item:hover { background:var(--bg); border-color:var(--border); }
.arch-item.active { background:var(--accent-lt); border-color:#bfdbfe; }
.arch-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:22px; }
.arch-item.active .arch-name { color:var(--accent); }
.arch-meta { font-size:11px; color:var(--text3); margin-top:2px; }
.arch-del { position:absolute; right:7px; top:50%; transform:translateY(-50%); width:18px; height:18px; border-radius:4px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); opacity:0; transition:opacity .1s, background .1s; }
.arch-item:hover .arch-del { opacity:1; }
.arch-del:hover { background:var(--red-lt); color:var(--red); }

/* ─── MAIN ────────────────────────────────── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Tabs */
.tabs { height:38px; flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:stretch; padding:0 16px; }
.tab { display:flex; align-items:center; gap:5px; padding:0 12px; cursor:pointer; border-bottom:2px solid transparent; font-size:12px; font-weight:500; color:var(--text3); transition:color .12s, border-color .12s; white-space:nowrap; margin-bottom:-1px; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover:not(.active) { color:var(--text2); }

/* Editor split */
.editor-area { flex:1; display:flex; overflow:hidden; min-height:0; position:relative; }
.ep { display:flex; flex-direction:column; overflow:hidden; min-height:0; min-width:0; background:var(--surface); }
.ep+.ep { border-left:none; }
.ep-head { height:36px; padding:0 14px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--surface2); }
.ep-label { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); }
.ep-btns { display:flex; gap:4px; }
.mbtn { background:none; border:1px solid var(--border2); color:var(--text2); font-family:var(--font); font-size:11px; padding:2px 9px; border-radius:5px; cursor:pointer; transition:all .1s; line-height:1.7; }
.mbtn:hover { border-color:var(--text2); color:var(--text); background:var(--bg); }

#md-input { flex:1; border:none; resize:none; background:var(--surface); color:var(--text); font-family:var(--mono); font-size:12.5px; line-height:1.75; padding:18px 20px; outline:none; overflow-y:auto; min-height:0; tab-size:2; }
#md-input::placeholder { color:var(--text3); font-style:italic; font-family:var(--font); }

#preview { flex:1; overflow-y:auto; padding:24px 30px; font-family:var(--serif); font-size:14.5px; line-height:1.85; background:var(--surface); color:var(--text); min-height:0; }
#preview h1 { font-family:var(--serif); font-size:1.65em; font-weight:600; margin:.9em 0 .4em; padding-bottom:.3em; border-bottom:1px solid var(--border); }
#preview h2 { font-size:1.28em; font-weight:600; margin:.85em 0 .25em; }
#preview h3 { font-size:1.08em; font-weight:600; margin:.7em 0 .2em; }
#preview p  { margin:.5em 0; }
#preview ul,#preview ol { margin:.4em 0; padding-left:1.6em; }
#preview li { margin:.2em 0; }
#preview strong { font-weight:600; }
#preview em { font-style:italic; }
#preview code { font-family:var(--mono); font-size:.81em; background:#f3f4f6; padding:1px 5px; border-radius:4px; color:#b45309; }
#preview pre { background:#f8f8f6; border:1px solid var(--border); padding:13px 16px; border-radius:7px; overflow-x:auto; margin:.7em 0; font-family:var(--mono); font-size:12px; line-height:1.65; }
#preview pre code { background:none; padding:0; color:var(--text); }
#preview blockquote { border-left:3px solid var(--border2); margin:.7em 0; padding:.2em 0 .2em 1em; color:var(--text2); font-style:italic; }
#preview hr { border:none; border-top:1px solid var(--border); margin:1.2em 0; }
#preview a { color:var(--accent); }
#preview .math-display { text-align:center; margin:1em 0; overflow-x:auto; }
#preview table { border-collapse:collapse; width:100%; margin:.7em 0; font-size:.9em; font-family:var(--font); }
#preview th { background:#f3f4f6; font-weight:600; }
#preview th,#preview td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
#preview tr:nth-child(even) td { background:#fafafa; }

/* ─── DRAG DIVIDER ────────────────────────── */
.divider { width:5px; flex-shrink:0; cursor:col-resize; background:var(--border); display:flex; align-items:center; justify-content:center; z-index:10; transition:background .15s; }
.divider:hover, .divider.dragging { background:#c5c0b8; }
.divider::after { content:''; width:2px; height:32px; border-radius:2px; background:var(--border2); display:block; transition:background .15s; }
.divider:hover::after, .divider.dragging::after { background:#9e9890; }

/* ─── FOOTER ──────────────────────────────── */
footer { height:var(--fh); flex-shrink:0; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:8px; box-shadow:0 -1px 3px rgba(0,0,0,.04); }
.fname-row { display:flex; align-items:center; border:1px solid var(--border2); border-radius:7px; overflow:hidden; transition:border-color .15s, box-shadow .15s; flex-shrink:0; }
.fname-row:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px #dbeafe; }
#filename { background:var(--surface); border:none; color:var(--text); font-family:var(--mono); font-size:12.5px; padding:7px 11px; outline:none; width:150px; }
.fname-ext { background:var(--bg); color:var(--text3); font-family:var(--mono); font-size:12px; padding:7px 9px; border-left:1px solid var(--border2); user-select:none; }

/* Copy button — primary */
.copy-btn {
  display:flex; align-items:center; gap:7px;
  background:var(--accent); color:#fff; border:none;
  font-family:var(--font); font-size:13px; font-weight:500;
  padding:9px 20px; border-radius:7px; cursor:pointer;
  transition:all .15s; white-space:nowrap; flex-shrink:0;
  box-shadow:0 1px 3px rgba(37,99,235,.2);
}
.copy-btn:hover:not(:disabled) { background:var(--accent-h); transform:translateY(-1px); box-shadow:0 3px 8px rgba(37,99,235,.28); }
.copy-btn:active:not(:disabled) { transform:none; }
.copy-btn:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }
.copy-btn.success { background:var(--green); box-shadow:0 1px 3px rgba(22,163,74,.25); }
.copy-btn.success:hover { background:#15803d; }

/* Save archive button */
.sbtn { display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--border2); color:var(--text2); font-family:var(--font); font-size:12.5px; padding:8px 14px; border-radius:7px; cursor:pointer; transition:all .12s; white-space:nowrap; flex-shrink:0; }
.sbtn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-lt); }

/* Font selector */
.font-select { background:var(--surface); border:1px solid var(--border2); color:var(--text2); font-family:var(--font); font-size:12px; padding:7px 8px; border-radius:7px; cursor:pointer; outline:none; flex-shrink:0; transition:all .12s; appearance:auto; }
.font-select:hover { border-color:var(--accent); color:var(--accent); }
.font-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px #dbeafe; }

/* Copy target toggle */
.copy-target-toggle { display:flex; border:1px solid var(--border2); border-radius:7px; overflow:hidden; flex-shrink:0; }
.ct-btn { background:none; border:none; padding:0 12px; height:36px; font-family:var(--font); font-size:12px; font-weight:500; cursor:pointer; color:var(--text3); transition:all .12s; white-space:nowrap; border-right:1px solid var(--border2); }
.ct-btn:last-child { border-right:none; }
.ct-btn.active { background:var(--accent); color:#fff; }
.ct-btn:not(.active):hover { background:var(--bg); color:var(--text2); }

.status { flex:1; font-size:11.5px; font-family:var(--mono); color:var(--text3); transition:color .2s; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.status.ok  { color:var(--green); }
.status.err { color:var(--red); }

@keyframes spin { to { transform:rotate(360deg); } }
.spin { width:13px; height:13px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; flex-shrink:0; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }
.no-select { user-select:none; pointer-events:none; }

/* ─── FOLDER SYSTEM ─────────────────────────────── */
.sb-btn-row { display:flex; gap:6px; }
.sb-btn-row .new-btn { flex:1; }
.new-folder-btn { flex-shrink:0; width:30px; border-radius:6px; background:none; border:1px solid var(--border2); color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.new-folder-btn:hover { background:var(--accent-lt); color:var(--accent); border-color:#bfdbfe; }

.folder-item { border-radius:7px; position:relative; margin-bottom:1px; }
.folder-header { display:flex; align-items:center; gap:4px; padding:5px 8px 5px 6px; cursor:pointer; border-radius:7px; transition:background .1s; min-height:30px; position:relative; }
.folder-header:hover { background:var(--bg); }
.folder-chevron { flex-shrink:0; color:var(--text3); transition:transform .15s; line-height:0; }
.folder-item.open > .folder-header .folder-chevron { transform:rotate(90deg); }
.folder-icon { flex-shrink:0; color:var(--text3); line-height:0; }
.folder-item.open > .folder-header .folder-icon { color:var(--accent); }
.folder-name { flex:1; font-size:12.5px; font-weight:500; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:46px; min-width:0; }
.folder-item.open > .folder-header .folder-name { color:var(--text); }
.folder-name-input { flex:1; font-size:12.5px; font-weight:500; font-family:var(--font); color:var(--text); background:var(--surface); border:1px solid var(--accent); border-radius:4px; padding:1px 5px; outline:none; min-width:0; }
.folder-actions { position:absolute; right:6px; top:50%; transform:translateY(-50%); display:flex; gap:2px; opacity:0; transition:opacity .1s; }
.folder-header:hover .folder-actions { opacity:1; }
.folder-btn { width:18px; height:18px; border-radius:4px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); transition:all .1s; }
.folder-btn:hover { background:var(--bg); color:var(--text2); }
.folder-btn.del:hover { background:var(--red-lt); color:var(--red); }

.folder-children { padding-left:14px; display:flex; flex-direction:column; gap:2px; padding-bottom:2px; }
.folder-item:not(.open) > .folder-children { display:none; }
.folder-empty-hint { font-size:11px; color:var(--text3); padding:3px 6px 5px; }

.uncategorized-label { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); padding:8px 10px 3px; }

/* archive item: move-to-folder button */
.arch-move { position:absolute; right:29px; top:50%; transform:translateY(-50%); width:18px; height:18px; border-radius:4px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text3); opacity:0; transition:opacity .1s, background .1s; }
.arch-item:hover .arch-move { opacity:1; }
.arch-move:hover { background:var(--accent-lt); color:var(--accent); }
/* widen name padding when move button is present */
.arch-item.has-folders .arch-name { padding-right:44px; }

/* floating move dropdown */
.move-dropdown { position:fixed; background:var(--surface); border:1px solid var(--border2); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.12); z-index:600; min-width:150px; max-width:200px; padding:4px 0; font-size:12.5px; }
.move-dd-item { padding:6px 12px; cursor:pointer; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background .1s; display:flex; align-items:center; gap:6px; }
.move-dd-item:hover { background:var(--bg); color:var(--text); }
.move-dd-item.active { color:var(--accent); font-weight:500; }
.move-dd-item.remove-item { color:var(--text3); }
.move-dd-item.remove-item:hover { color:var(--red); background:var(--red-lt); }
.move-dd-sep { height:1px; background:var(--border); margin:3px 0; }

/* ─── HIGHLIGHT TOOLBAR ─────────────────────────────── */
.hl-toolbar { display:flex; align-items:center; gap:5px; }
.hl-swatch { width:16px; height:16px; border-radius:4px; border:1.5px solid rgba(0,0,0,.13); cursor:pointer; flex-shrink:0; padding:0; transition:transform .1s, box-shadow .1s; }
.hl-swatch:hover { transform:scale(1.2); box-shadow:0 1px 5px rgba(0,0,0,.2); }
.hl-swatch.armed { box-shadow:0 0 0 2px var(--accent); transform:scale(1.15); }
.hl-clear-btn { background:none; border:1px solid var(--border2); color:var(--text3); font-family:var(--font); font-size:10px; padding:1px 6px; border-radius:4px; cursor:pointer; white-space:nowrap; transition:all .1s; line-height:1.6; }
.hl-clear-btn:hover { border-color:var(--red); color:var(--red); background:var(--red-lt); }
.hl-vsep { width:1px; height:13px; background:var(--border); flex-shrink:0; }

/* Editable preview */
#preview[contenteditable="true"] { outline:none; caret-color:var(--accent); }
#preview[contenteditable="true"]:focus-within { box-shadow:inset 2px 0 0 var(--accent); }
.math-display, .math-inline { cursor:default; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="11" height="11" rx="2"/>
        <line x1="3.5" y1="4.5" x2="9.5" y2="4.5"/>
        <line x1="3.5" y1="6.5" x2="7.5" y2="6.5"/>
        <line x1="3.5" y1="8.5" x2="6"   y2="8.5"/>
      </svg>
    </div>
    Mark2Doc
  </div>
  <div class="h-sep"></div>
  <span class="h-sub">Markdown → Word · 支持 LaTeX 公式</span>
  <div class="h-gap"></div>
  <span id="mj-badge"><span class="dot"></span>&nbsp;MathJax 加载中…</span>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-title-row">
        <span class="sb-title">存档记录</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="sb-badge" id="arch-count">0</span>
          <button class="sb-collapse-btn" id="sb-collapse-btn" title="折叠侧边栏">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,1 2,4.5 6,8"/></svg>
          </button>
        </div>
      </div>
      <div class="sb-btn-row">
        <button class="new-btn" id="new-btn">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="5.5" y1="1" x2="5.5" y2="10"/><line x1="1" y1="5.5" x2="10" y2="5.5"/></svg>
          新建文档
        </button>
        <button class="new-folder-btn" id="new-folder-btn" title="新建文件夹">
          <svg width="13" height="12" viewBox="0 0 14 13" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 3h5l1.5 2H13v6H1V3z"/>
            <line x1="7" y1="6.5" x2="7" y2="10.5"/>
            <line x1="5" y1="8.5" x2="9" y2="8.5"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="arch-list" id="arch-list">
      <div class="arch-empty">存档后，记录将在此显示</div>
    </div>
  </aside>

  <!-- SIDEBAR EXPAND FAB -->
  <button class="sb-expand-fab" id="sb-expand-fab" title="展开存档">
    <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,1 7,4.5 3,8"/></svg>
  </button>

  <!-- MAIN -->
  <div class="main">

    <div class="tabs">

*Weißea et al. 2015, Mechanistic links between cellular trade-offs, gene expression, and growth*

  pv.querySelectorAll('.math-display').forEach(el=>{

// ─── TURNDOWN (HTML → Markdown) ────────────────────────────────
let _td=null;
function getTd(){
  if(_td) return _td;
  if(!window.TurndownService) return null;
  _td=new TurndownService({headingStyle:'atx',codeBlockStyle:'fenced',bulletListMarker:'-',strongDelimiter:'**',emDelimiter:'*'});
  // Restore display math from data-latex attribute
  _td.addRule('mathDisplay',{
    filter: n=>n.nodeName==='DIV' && n.classList.contains('math-display') && n.dataset.latex,
    replacement: (_,n)=>`\n\n$$${n.dataset.latex}$$\n\n`
  });
  // Restore inline math from data-latex attribute
  _td.addRule('mathInline',{
    filter: n=>n.nodeName==='SPAN' && n.classList.contains('math-inline') && n.dataset.latex,
    replacement: (_,n)=>`$${n.dataset.latex}$`
  });
  // Strip highlight spans — highlights are visual only, not synced to Markdown
  _td.addRule('highlight',{
    filter: n=>n.nodeName==='SPAN' && n.style && n.style.backgroundColor!=='',
    replacement: content=>content
  });
  // Strip bare spans (execCommand artifacts)
  _td.addRule('bareSpan',{ filter:'span', replacement: content=>content });
  return _td;
}

function syncPreviewNow(){

// ─── SVG MATH FOR COPY ─────────────────────────────────────────
// Renders LaTeX → inline SVG string (with white background, black text)
const svgCache = new Map();
async function latexToSvgStr(latex, disp){
  const key=(disp?'D':'I')+latex;
  if(svgCache.has(key)) return svgCache.get(key);
  try{
    await mjReady;
    const nd  = await MathJax.tex2svgPromise(latex.trim(),{display:disp});
    const svg = nd.querySelector('svg');
    if(!svg){ svgCache.set(key,null); return null; }

    // Measure size
    const host=document.createElement('div');
    host.style.cssText='position:fixed;visibility:hidden;top:-99999px;left:0;font-size:16px;line-height:1';
    host.appendChild(svg.cloneNode(true)); document.body.appendChild(host);
    const rc=host.firstChild.getBoundingClientRect(); document.body.removeChild(host);
    const wPx=Math.max(rc.width||40,4), hPx=Math.max(rc.height||14,4);

    svg.setAttribute('width', wPx+'px');
    svg.setAttribute('height',hPx+'px');
    svg.setAttribute('xmlns','http://www.w3.org/2000/svg');
    svg.setAttribute('xmlns:xlink','http://www.w3.org/1999/xlink');
    // Force black paths for Word compatibility
    svg.querySelectorAll('[style]').forEach(el=>{
      el.style.fill='#000'; el.style.stroke='none';
    });
    const str = new XMLSerializer().serializeToString(svg);
    svgCache.set(key,{str,wPx,hPx}); return {str,wPx,hPx};
  }catch(e){ console.warn('[svgmath]',e); svgCache.set(key,null); return null; }
}

// ─── BUILD WORD-READY HTML ─────────────────────────────────────
// Math: MathML via MathJax.tex2mml (Word 2016+ renders as native equation).
// Fallback: base64-encoded SVG <img> for older Word.

const FONT_STACKS = {
  calibri:  "Calibri,'宋体',sans-serif",
  times:    "'Times New Roman','宋体','SimSun',serif",
  arial:    "Arial,'黑体','SimHei',sans-serif",
  songti:   "'宋体','SimSun','Times New Roman',serif",
  heiti:    "'黑体','SimHei',Arial,sans-serif",
};

async function buildWordHtml(md){
  await mjReady;

  const fontKey = document.getElementById('word-font').value;
  const fontFamily = FONT_STACKS[fontKey] || FONT_STACKS.calibri;

  const wordStyles = `
    body{font-family:${fontFamily};font-size:11pt;color:#000;line-height:1.6;margin:0;padding:0}
    h1{font-size:18pt;font-weight:bold;color:#1F3864;margin:18pt 0 6pt;border-bottom:1pt solid #ccc;padding-bottom:3pt}
    h2{font-size:14pt;font-weight:bold;color:#2E5596;margin:14pt 0 4pt}
    h3{font-size:12pt;font-weight:bold;color:#375623;margin:10pt 0 3pt}
    h4{font-size:11pt;font-weight:bold;margin:8pt 0 2pt}
    p{margin:4pt 0}
    ul,ol{margin:4pt 0;padding-left:18pt}
    li{margin:2pt 0}
    code{font-family:'Courier New',monospace;font-size:9pt;background:#f3f4f6;padding:1px 4px}
    pre{font-family:'Courier New',monospace;font-size:9pt;background:#f8f8f6;border:1pt solid #ddd;padding:8pt 10pt;margin:6pt 0}
    blockquote{border-left:3pt solid #ccc;margin:6pt 0;padding:2pt 0 2pt 10pt;color:#555;font-style:italic}
    hr{border:none;border-top:1pt solid #ccc;margin:10pt 0}
  `;

  let htmlBody = marked.parse(md);

  // ── Try MathML path (Word 2016+ pastes as native editable equation) ──
  if(typeof MathJax.tex2mml === 'function'){
    // Display math: <div class="math-display">\[latex\]</div>
    htmlBody = htmlBody.replace(/<div class="math-display">\\\[([\s\S]*?)\\\]<\/div>/g, (_, latex)=>{
      try{
        const mml = MathJax.tex2mml(latex.trim(), {display:true});
        return `<p style="text-align:center;margin:10pt 0">${mml}</p>`;
      }catch(e){ return `<p><i>[公式: ${latex}]</i></p>`; }
    });
    // Inline math: <span class="math-inline">\(latex\)</span>
    htmlBody = htmlBody.replace(/<span class="math-inline">\\\(([\s\S]*?)\\\)<\/span>/g, (_, latex)=>{
      try{
        return MathJax.tex2mml(latex.trim(), {display:false});
      }catch(e){ return `<i>${latex}</i>`; }
    });

  // ── Fallback: SVG image (older Word / MathML unavailable) ──
  }else{
    const mathTokens=[];
    const lexed=marked.lexer(md);
    function collectMath(tokens){
      for(const t of tokens||[]){
        if(t.type==='mathBlock'||t.type==='mathInline') mathTokens.push({math:t.math,disp:t.type==='mathBlock'});
        if(t.tokens) collectMath(t.tokens);
        if(t.items)  t.items.forEach(i=>collectMath(i.tokens||[]));
      }
    }
    collectMath(lexed);
    await Promise.all(mathTokens.map(m=>latexToSvgStr(m.math,m.disp)));

    htmlBody = await replaceAsync(htmlBody, /<div class="math-display">\\\[([\s\S]*?)\\\]<\/div>/g, async (_,latex)=>{
      const r=await latexToSvgStr(latex.trim(),true);
      if(!r) return `<p><i>${latex}</i></p>`;
      const b64=btoa(unescape(encodeURIComponent(r.str)));
      return `<p style="text-align:center;margin:10pt 0"><img src="data:image/svg+xml;base64,${b64}" width="${Math.round(r.wPx*.75)}" height="${Math.round(r.hPx*.75)}" style="display:inline-block;vertical-align:middle"/></p>`;
    });
    htmlBody = await replaceAsync(htmlBody, /<span class="math-inline">\\\(([\s\S]*?)\\\)<\/span>/g, async (_,latex)=>{
      const r=await latexToSvgStr(latex.trim(),false);
      if(!r) return `<i>${latex}</i>`;
      const b64=btoa(unescape(encodeURIComponent(r.str)));
      return `<img src="data:image/svg+xml;base64,${b64}" width="${Math.round(r.wPx*.75)}" height="${Math.round(r.hPx*.75)}" style="display:inline;vertical-align:middle"/>`;
    });
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${wordStyles}</style></head><body>${htmlBody}</body></html>`;
}

// Async replace helper
async function replaceAsync(str, regex, asyncFn){
  const promises=[];
  str.replace(regex, (match,...args)=>{ promises.push(asyncFn(match,...args)); return match; });
  const results = await Promise.all(promises);
  let i=0;
  return str.replace(regex, ()=>results[i++]);
}

// ─── LATEX → HTML (Google Docs mode) ──────────────────────────
// Converts LaTeX to HTML using <sub>/<sup> + Unicode symbols.
function latexToHtmlSimple(tex){

  const SYMS={

    xi:'ξ',pi:'π',varpi:'ϖ',rho:'ρ',varrho:'ϱ',sigma:'σ',varsigma:'ς',tau:'τ',
    upsilon:'υ',phi:'φ',varphi:'φ',chi:'χ',psi:'ψ',omega:'ω',
    // Greek uppercase
    Gamma:'Γ',Delta:'Δ',Theta:'Θ',Lambda:'Λ',Xi:'Ξ',Pi:'Π',Sigma:'Σ',
    Upsilon:'Υ',Phi:'Φ',Psi:'Ψ',Omega:'Ω',

    times:'×',div:'÷',pm:'±',mp:'∓',cdot:'·',circ:'∘',bullet:'•',
    leq:'≤',geq:'≥',neq:'≠',approx:'≈',equiv:'≡',sim:'∼',simeq:'≃',cong:'≅',
    ll:'≪',gg:'≫',propto:'∝',
    // Sets
    subset:'⊂',supset:'⊃',subseteq:'⊆',supseteq:'⊇',in:'∈',notin:'∉',
    cup:'∪',cap:'∩',setminus:'∖',emptyset:'∅',
    // Misc math
    infty:'∞',partial:'∂',nabla:'∇',forall:'∀',exists:'∃',nexists:'∄',
    neg:'¬',wedge:'∧',vee:'∨',oplus:'⊕',otimes:'⊗',
    // Arrows
    rightarrow:'→',leftarrow:'←',leftrightarrow:'↔',uparrow:'↑',downarrow:'↓',
    Rightarrow:'⇒',Leftarrow:'⇐',Leftrightarrow:'⇔',to:'→',gets:'←',mapsto:'↦',

    // Dots & misc
    cdots:'⋯',ldots:'…',vdots:'⋮',ddots:'⋱',
    langle:'⟨',rangle:'⟩',lfloor:'⌊',rfloor:'⌋',lceil:'⌈',rceil:'⌉',
    mid:'|',vert:'|',quad:' ',qquad:'  ',
    // Named functions (keep as text)
    lim:'lim',log:'log',ln:'ln',exp:'exp',sin:'sin',cos:'cos',tan:'tan',
    max:'max',min:'min',inf:'inf',sup:'sup',det:'det',dim:'dim',ker:'ker',arg:'arg',
    // Ignore these layout commands
    left:'',right:'',limits:'',nolimits:'',displaystyle:'',textstyle:'',
    scriptstyle:'',scriptscriptstyle:'',
  };
  let i=0; const L=tex.length;
  function skipWS(){ while(i<L&&tex[i]===' ')i++; }
  function parseArg(){
    skipWS();
    if(i>=L) return '';
    if(tex[i]==='{'){i++;return parseUntil('}');}
    if(tex[i]==='\\'){return parseToken();}
    return tex[i++];
  }
  function parseUntil(end){
    let out='';
    while(i<L&&tex[i]!==end) out+=parseToken();
    if(i<L)i++;
    return out;
  }
  function parseToken(){
    if(i>=L) return '';
    const c=tex[i];
    if(c==='\\'){
      i++;
      if(i>=L) return '\\';
      if(!/[a-zA-Z]/.test(tex[i])){
        const ch=tex[i++];
        if(' ,.;:!'.includes(ch)) return ' ';
        if(ch==='{') return '{';
        if(ch==='}') return '}';
        if(ch==='\\') return ' ';
        if(ch==='|') return '‖';
        if(ch==='-') return '−';
        return ch;
      }
      let cmd='';
      while(i<L&&/[a-zA-Z*]/.test(tex[i]))cmd+=tex[i++];
      if(cmd==='frac'||cmd==='dfrac'||cmd==='tfrac'){
        const num=parseArg(),den=parseArg();return `(${num})/(${den})`;
      }
      if(cmd==='sqrt'){
        skipWS();let nr='';
        if(i<L&&tex[i]==='['){i++;while(i<L&&tex[i]!==']')nr+=tex[i++];if(i<L)i++;}
        const arg=parseArg();return nr?`<sup>${nr}</sup>√(${arg})`:`√(${arg})`;
      }
      if(['text','mathrm','mathbf','mathit','mathsf','mathtt','mathbb','mathcal',
          'boldsymbol','operatorname','mbox','hbox','rm','bf','it'].includes(cmd))
        return parseArg();
      if(['overline','underline','hat','tilde','bar','dot','ddot','vec',
          'widehat','widetilde','acute','grave','breve','check'].includes(cmd))
        return parseArg();
      if(['underbrace','overbrace','underset','overset'].includes(cmd)){
        parseArg();return parseArg();
      }
      if(cmd==='hspace'||cmd==='vspace'){parseArg();return ' ';}
      if(cmd==='begin'||cmd==='end'){parseArg();return '';}
      if(cmd==='nonumber'||cmd==='notag') return '';
      if(cmd==='label'||cmd==='tag'||cmd==='ref'){parseArg();return '';}
      if(cmd==='binom'){const a=parseArg(),b=parseArg();return `C(${a},${b})`;}
      if(cmd==='not'){
        const t=parseToken();
        const neg={'=':'≠','<':'≮','>':'≯','∈':'∉','⊂':'⊄','∼':'≁'};
        return neg[t]??'¬'+t;
      }
      return SYMS[cmd]??cmd;
    }
    if(c==='_'){i++;const a=parseArg();return `<sub>${a}</sub>`;}
    if(c==='^'){i++;const a=parseArg();return `<sup>${a}</sup>`;}
    if(c==='{'){i++;return parseUntil('}');}
    if(c==='}'){i++;return '';}
    if(c==='&'){i++;return ' ';}
    if(c==='~'){i++;return '\u00a0';}
    if(c==='-'){i++;return '−';}
    i++;return c;
  }
  let result='';
  while(i<L) result+=parseToken();
  return result.replace(/ {2,}/g,' ').trim();
}

// ─── BUILD GOOGLE DOCS HTML ────────────────────────────────────
async function buildDocsHtml(md){
  const fontKey=document.getElementById('word-font').value;
  const fontFamily=FONT_STACKS[fontKey]||FONT_STACKS.calibri;
  const docsStyles=`
    body{font-family:${fontFamily};font-size:11pt;color:#000;line-height:1.6;margin:0;padding:0}
    h1{font-size:18pt;font-weight:bold;color:#1F3864;margin:18pt 0 6pt;border-bottom:1pt solid #ccc;padding-bottom:3pt}
    h2{font-size:14pt;font-weight:bold;color:#2E5596;margin:14pt 0 4pt}
    h3{font-size:12pt;font-weight:bold;color:#375623;margin:10pt 0 3pt}
    h4{font-size:11pt;font-weight:bold;margin:8pt 0 2pt}
    p{margin:4pt 0}
    ul,ol{margin:4pt 0;padding-left:18pt}
    li{margin:2pt 0}
    code{font-family:'Courier New',monospace;font-size:9pt;background:#f3f4f6;padding:1px 4px}
    pre{font-family:'Courier New',monospace;font-size:9pt;background:#f8f8f6;border:1pt solid #ddd;padding:8pt 10pt;margin:6pt 0}
    blockquote{border-left:3pt solid #ccc;margin:6pt 0;padding:2pt 0 2pt 10pt;color:#555;font-style:italic}
    hr{border:none;border-top:1pt solid #ccc;margin:10pt 0}
  `;
  let htmlBody=marked.parse(md);
  htmlBody=htmlBody.replace(/<div class="math-display">\\\[([\s\S]*?)\\\]<\/div>/g,(_,latex)=>
    `<p style="text-align:center;margin:10pt 0">${latexToHtmlSimple(latex.trim())}</p>`
  );
  htmlBody=htmlBody.replace(/<span class="math-inline">\\\(([\s\S]*?)\\\)<\/span>/g,(_,latex)=>
    latexToHtmlSimple(latex.trim())
  );
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${docsStyles}</style></head><body>${htmlBody}</body></html>`;
}

// ─── COPY TARGET ───────────────────────────────────────────────
const copyBtn = document.getElementById('copy-btn');
const statusEl= document.getElementById('status');
let copyTarget='word';

const _COPY_ICON=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="4.5" width="8" height="8" rx="1.5"/><path d="M9.5 4.5V3A1.5 1.5 0 0 0 8 1.5H3A1.5 1.5 0 0 0 1.5 3v5A1.5 1.5 0 0 0 3 9.5h1.5"/></svg>`;

function restoreCopyBtn(){
  copyBtn.classList.remove('success');
  copyBtn.innerHTML=_COPY_ICON+'&nbsp;'+(copyTarget==='docs'?'复制到 Docs':'复制到 Word');
  copyBtn.disabled=false;
}
window.setCopyTarget=function(t){
  copyTarget=t;
  document.getElementById('ct-word').classList.toggle('active',t==='word');
  document.getElementById('ct-docs').classList.toggle('active',t==='docs');
  if(!copyBtn.disabled) restoreCopyBtn();
};

function setStatus(msg,type){ statusEl.textContent=msg; statusEl.className='status'+(type?' '+type:''); }

// ─── COPY BUTTON ───────────────────────────────────────────────
copyBtn.addEventListener('click', async()=>{
  const md=inp.value.trim();
  if(!md){ setStatus('请先输入 Markdown 内容','err'); return; }

  copyBtn.disabled=true;
  copyBtn.innerHTML='<div class="spin"></div>&nbsp;处理中…';
  setStatus(copyTarget==='docs'?'正在转换公式…':'正在渲染公式…');

  try{
    const html=copyTarget==='docs' ? await buildDocsHtml(md) : await buildWordHtml(md);
    const blob=new Blob([html],{type:'text/html'});
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob})]);

    copyBtn.classList.add('success');
    copyBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,10.5 12,4"/></svg>&nbsp;已复制！`;
    setStatus('✓ 已复制，粘贴到'+(copyTarget==='docs'?'Google Docs':'Word')+'即可','ok');
    setTimeout(restoreCopyBtn,2500);

  }catch(e){
    console.error(e);
    setStatus('复制失败：'+(e.message||String(e)),'err');
    restoreCopyBtn();
  }
});

// ─── ARCHIVE ───────────────────────────────────────────────────
let archives=[], folders=[], folderCollapsed={}, activeId=null;
function timeAgo(d){ const s=(Date.now()-new Date(d))/1000; if(s<60) return '刚刚'; if(s<3600) return Math.floor(s/60)+'分钟前'; if(s<86400) return Math.floor(s/3600)+'小时前'; return Math.floor(s/86400)+'天前'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const FOLDER_ICON_SVG = `<svg width="11" height="10" viewBox="0 0 14 13" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h5l1.5 2H13v6H1V3z"/></svg>`;

function archItemHtml(a){
  const hf = folders.length > 0;
  return `<div class="arch-item${a.id===activeId?' active':''}${hf?' has-folders':''}" onclick="loadArch('${a.id}')">
    <div class="arch-name">${esc(a.name)}</div>
    <div class="arch-meta">${timeAgo(a.date)} · ${a.md.length.toLocaleString()} 字符</div>
    ${hf?`<button class="arch-move" title="移动到文件夹" onclick="openMoveMenu('${a.id}',event)">${FOLDER_ICON_SVG}</button>`:''}
    <button class="arch-del" title="删除" onclick="delArch('${a.id}',event)">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><line x1="1" y1="1" x2="8" y2="8"/><line x1="8" y1="1" x2="1" y2="8"/></svg>
    </button>
  </div>`;
}

function renderArchive(){
  const list=document.getElementById('arch-list');
  document.getElementById('arch-count').textContent=archives.length;

  if(!archives.length && !folders.length){
    list.innerHTML='<div class="arch-empty">存档后，记录将在此显示</div>';
    return;
  }

  if(!folders.length){
    list.innerHTML = archives.length ? archives.map(archItemHtml).join('') : '<div class="arch-empty">存档后，记录将在此显示</div>';
    return;
  }

  let html='';
  folders.forEach(f=>{
    const isOpen=!folderCollapsed[f.id];
    const children=archives.filter(a=>a.folderId===f.id);
    html+=`<div class="folder-item${isOpen?' open':''}" data-fid="${f.id}">
      <div class="folder-header" onclick="toggleFolder('${f.id}')">
        <span class="folder-chevron"><svg width="8" height="8" viewBox="0 0 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,1 6,4 2,7"/></svg></span>
        <span class="folder-icon"><svg width="13" height="11" viewBox="0 0 14 13" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h5l1.5 2H13v6H1V3z"/></svg></span>
        <span class="folder-name" ondblclick="startRenameFolder('${f.id}',event)">${esc(f.name)}</span>
        <div class="folder-actions">
          <button class="folder-btn" title="重命名" onclick="startRenameFolder('${f.id}',event)">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 7.5l.7-.25 2.8-2.8-.45-.45-2.8 2.8-.25.7z"/><line x1="4.3" y1="1.7" x2="7.3" y2="4.7"/></svg>
          </button>
          <button class="folder-btn del" title="删除文件夹" onclick="delFolder('${f.id}',event)">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><line x1="1" y1="1" x2="8" y2="8"/><line x1="8" y1="1" x2="1" y2="8"/></svg>
          </button>
        </div>
      </div>
      <div class="folder-children">
        ${children.length ? children.map(archItemHtml).join('') : '<div class="folder-empty-hint">空文件夹</div>'}
      </div>
    </div>`;
  });

  const uncat=archives.filter(a=>!a.folderId);
  if(uncat.length){
    html+=`<div class="uncategorized-label">未分类</div>`;
    html+=uncat.map(archItemHtml).join('');
  }

  if(!html) html='<div class="arch-empty">存档后，记录将在此显示</div>';
  list.innerHTML=html;
}

// ─── FOLDER MANAGEMENT ─────────────────────────────────────────
window.toggleFolder=function(fid){
  folderCollapsed[fid]=!folderCollapsed[fid];
  renderArchive();
};

window.startRenameFolder=function(fid,e){
  e.stopPropagation();
  const folderEl=document.querySelector(`.folder-item[data-fid="${fid}"]`);
  if(!folderEl) return;
  const nameSpan=folderEl.querySelector('.folder-name');
  const f=folders.find(x=>x.id===fid);
  if(!f||!nameSpan) return;
  const input=document.createElement('input');
  input.className='folder-name-input';
  input.value=f.name;
  nameSpan.replaceWith(input);
  input.focus(); input.select();
  const commit=()=>{ f.name=input.value.trim()||f.name; renderArchive(); };
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'){ ev.preventDefault(); input.blur(); }
    if(ev.key==='Escape'){ renderArchive(); }
  });
};

window.delFolder=function(fid,e){
  e.stopPropagation();
  archives.forEach(a=>{ if(a.folderId===fid) a.folderId=null; });
  folders=folders.filter(x=>x.id!==fid);
  delete folderCollapsed[fid];
  renderArchive();
};

document.getElementById('new-folder-btn').addEventListener('click',()=>{
  const id='f'+Date.now();
  folders.unshift({id,name:'新建文件夹'});
  folderCollapsed[id]=false;
  renderArchive();
  window.startRenameFolder(id,{stopPropagation:()=>{}});
});

// ─── MOVE TO FOLDER ────────────────────────────────────────────
let _activeDd=null;
function _closeDd(){ if(_activeDd){ _activeDd.remove(); _activeDd=null; } }

window.openMoveMenu=function(archId,e){
  e.stopPropagation();
  _closeDd();
  const a=archives.find(x=>x.id===archId); if(!a) return;
  const btn=e.currentTarget;
  const rect=btn.getBoundingClientRect();

  const dd=document.createElement('div');
  dd.className='move-dropdown';

  if(a.folderId){
    const rem=document.createElement('div');
    rem.className='move-dd-item remove-item';
    rem.innerHTML=`<svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><line x1="1" y1="1" x2="8" y2="8"/><line x1="8" y1="1" x2="1" y2="8"/></svg> 移出文件夹`;
    rem.addEventListener('click',()=>{ a.folderId=null; _closeDd(); renderArchive(); setStatus('已移出文件夹','ok'); });
    dd.appendChild(rem);
    const sep=document.createElement('div'); sep.className='move-dd-sep'; dd.appendChild(sep);
  }

  if(folders.length){
    folders.forEach(f=>{
      const item=document.createElement('div');
      item.className='move-dd-item'+(a.folderId===f.id?' active':'');
      item.innerHTML=`${FOLDER_ICON_SVG} ${esc(f.name)}`;
      item.addEventListener('click',()=>{ a.folderId=f.id; _closeDd(); renderArchive(); setStatus('已移入：'+f.name,'ok'); });
      dd.appendChild(item);
    });
  } else {
    const empty=document.createElement('div');
    empty.className='move-dd-item';
    empty.style.cssText='color:var(--text3);cursor:default';
    empty.textContent='暂无文件夹';
    dd.appendChild(empty);
  }

  document.body.appendChild(dd);
  const ddW=dd.offsetWidth, ddH=dd.offsetHeight;
  dd.style.top=Math.min(rect.bottom+4, window.innerHeight-ddH-8)+'px';
  dd.style.left=Math.max(4, Math.min(rect.left-ddW+rect.width, window.innerWidth-ddW-8))+'px';
  _activeDd=dd;
  setTimeout(()=>document.addEventListener('click',_closeDd,{once:true}),0);
};

// ─── ARCHIVE CRUD ──────────────────────────────────────────────
window.loadArch = function(id){
  const a=archives.find(x=>x.id===id); if(!a) return;
  pvEdited=false; activeId=id; inp.value=a.md;
  document.getElementById('filename').value=a.name;
  svgCache.clear(); renderPreview(); renderArchive();
  setStatus('已打开：'+a.name,'ok');
};
window.delArch = function(id,e){
  e.stopPropagation();
  archives=archives.filter(x=>x.id!==id);
  if(activeId===id) activeId=null;
  renderArchive();
};
document.getElementById('save-btn').addEventListener('click',()=>{
  if(pvEdited){ clearTimeout(pvSyncTimer); syncPreviewNow(); }
  const md=inp.value.trim();
  if(!md){ setStatus('内容为空，无法存档','err'); return; }
  const name=(document.getElementById('filename').value.trim()||'未命名');
  if(activeId){
    const a=archives.find(x=>x.id===activeId);
    if(a){ a.md=md; a.name=name; a.date=new Date().toISOString(); renderArchive(); setStatus('已更新存档：'+name,'ok'); return; }
  }
  activeId='a'+Date.now();
  archives.unshift({id:activeId,name,md,date:new Date().toISOString()});
  renderArchive();
  setStatus('已存档：'+name,'ok');
});
document.getElementById('new-btn').addEventListener('click',()=>{
  pvEdited=false; activeId=null; inp.value=''; document.getElementById('filename').value='document';
  pv.innerHTML=''; svgCache.clear(); setStatus(''); renderArchive(); inp.focus();
});

// ─── SIDEBAR COLLAPSE ──────────────────────────────────────────
(function(){
  const sidebar   = document.querySelector('.sidebar');
  const collapseBtn = document.getElementById('sb-collapse-btn');
  const expandFab   = document.getElementById('sb-expand-fab');
  collapseBtn.addEventListener('click', ()=>{
    sidebar.classList.add('collapsed');
    expandFab.classList.add('visible');
  });
  expandFab.addEventListener('click', ()=>{
    sidebar.classList.remove('collapsed');
    expandFab.classList.remove('visible');
  });
})();

document.getElementById('btn-sample').addEventListener('click',()=>{ pvEdited=false; inp.value=SAMPLE; svgCache.clear(); renderPreview(); });
document.getElementById('btn-clear').addEventListener('click',()=>{ pvEdited=false; inp.value=''; pv.innerHTML=''; svgCache.clear(); setStatus(''); });
renderPreview();
mjReady.then(()=>{ if(!pvEdited) renderPreview(); });
</script>
